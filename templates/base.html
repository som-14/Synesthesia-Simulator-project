<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Synesthesia Simulator{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <a href="{{ url_for('index') }}">🏠 Home</a>
        <a href="{{ url_for('text_visualizer') }}">📝 Text</a>
        <a href="{{ url_for('audio_visualizer') }}">🎵 Audio</a>
        <a href="{{ url_for('spatial_visualizer') }}">📍 Spatial</a>
        <a href="{{ url_for('profile_builder') }}">👤 Profile</a>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
